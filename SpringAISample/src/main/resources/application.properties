# =========================
# Application
# =========================
spring.application.name=SpringAISample

# =========================
# Ollama AI
# =========================
spring.ai.ollama.base-url=http://localhost:11434

spring.ai.ollama.chat.model=smallthinker:latest
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.chat.options.max-tokens=2048

spring.ai.ollama.embedding.model=smallthinker:latest

# =========================
# PostgreSQL Database
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/chatbot_db?currentSchema=public&serverTimezone=Asia/Kolkata
spring.datasource.username=om_2026
spring.datasource.password=manager2026
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# Virtual Threads (Java 21)
# =========================
spring.threads.virtual.enabled=true

# =========================
# Redis
# =========================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# =========================
# OAuth2 GitHub Login
# =========================
spring.security.oauth2.client.registration.github.client-id=Ov23liiNWGUDM8hlif4g
spring.security.oauth2.client.registration.github.client-secret=91100f43f7f81753f7fc3d02dccdcb91313eeba5
spring.security.oauth2.client.registration.github.scope=user:email,read:user

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=login

# =========================
# App Custom Config
# =========================
app.rate-limit.requests-per-minute=100

app.training.interval-minutes=30
app.training.quality-threshold=0.85

app.vector-store.top-k=5
app.vector-store.similarity-threshold=0.75

app.auth.enabled=true
app.auth.allowed-domains=github.com

app.security.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
app.security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.security.cors.allowed-headers=*
app.security.cors.allow-credentials=true

# =========================
# Logging
# =========================
logging.config=classpath:logback-spring.xml

logging.level.com.springaisample=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.data=INFO
logging.level.org.springframework.security=DEBUG